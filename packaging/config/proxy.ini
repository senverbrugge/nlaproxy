; nlaproxy freerdp-proxy3 configuration.
;
; This file is consumed by `/usr/bin/freerdp-proxy3 /etc/nlaproxy/proxy.ini`,
; spawned via systemd unit nlaproxy-freerdp.service.
;
; Front (PAM/CyberArk-side):
;   - listen on 0.0.0.0:3389
;   - require NLA (CredSSP/NTLMv2)
;   - validate against the SAM file written by nlaproxy-cached, which is
;     populated when users SSH in with passwords
;
; Back (xrdp-side):
;   - connect to 127.0.0.1:3390 (xrdp moved off 3389)
;   - TLS only (xrdp doesn't speak NLA)
;   - inject the plaintext Username/Password into the upstream Client Info PDU
;     using the nlaproxy plugin's ServerPostConnect hook; xrdp PAM-validates
;     them as if the user had typed them at the xrdp login window

[Server]
Host=0.0.0.0
Port=3389
; freerdp-proxy3 reads this SAM file on every NLA handshake. nlaproxy-cached
; rewrites it atomically whenever an entry is added or expires.
SamFile=/run/nlaproxy/users.sam

[Target]
Host=127.0.0.1
Port=3390
FixedTarget=true
; xrdp's self-signed cert: don't require valid CA chain on the proxy->xrdp leg.
TlsSecLevel=0
; Intentionally NO User/Domain/Password here - the nlaproxy plugin populates
; them per-session from the cache daemon.
SmartcardAuth=false

[Codecs]
RFX=true
NSC=true

[Channels]
; Display / dynamic resolution / clipboard text are the supported set.
GFX=true
DisplayControl=true
Clipboard=true
AudioInput=false
AudioOutput=true
; Drive and printer redirection through freerdp-proxy3 -> xrdp is known to be
; brittle (FreeRDP issues #10667, #12069); leave them off until you have a
; specific reason to enable them.
DeviceRedirection=false
VideoRedirection=false
CameraRedirection=false
RemoteApp=false
PassthroughIsBlacklist=true
Passthrough=
Intercept=

[Input]
Keyboard=true
Mouse=true
Multitouch=true

[Security]
; --- front (toward the PAM server) ---
; NLA required, TLS available, no legacy RDP-Security.
ServerTlsSecurity=true
ServerNlaSecurity=true
ServerRdpSecurity=false
; --- back (toward xrdp) ---
; xrdp does TLS but not NLA. Allow fallback so older xrdp builds still work.
ClientTlsSecurity=true
ClientNlaSecurity=false
ClientRdpSecurity=false
ClientAllowFallbackToTls=true

[Plugins]
Modules=nlaproxy
Required=nlaproxy

[Certificates]
; Reuse xrdp's self-signed certificate so RDP clients that have already pinned
; xrdp's fingerprint don't need to re-trust anything. If you prefer a separate
; cert, generate one with `winpr-makecert3 -rdp -path /etc/nlaproxy nlaproxy`.
CertificateFile=/etc/xrdp/cert.pem
PrivateKeyFile=/etc/xrdp/key.pem
